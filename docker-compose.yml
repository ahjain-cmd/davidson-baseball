services:
  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      # Mount only the precomputed DuckDB — parquet not needed for core pages
      - ${DATA_DIR:-.}/davidson.duckdb:/app/davidson.duckdb:ro
      # Mount cache directory for fast league percentile loading
      - ${DATA_DIR:-.}/.cache:/app/.cache
      # Optional: mount TrueMedia data
      - ${DATA_DIR:-.}/export.json:/app/export.json:ro
      # Blast Motion swing sensor data
      - "${DATA_DIR:-.}/Metrics - All Players - 2019-09-11 - 2026-02-18 - 1772478721.csv:/app/Metrics - All Players - 2019-09-11 - 2026-02-18 - 1772478721.csv:ro"
    environment:
      - STREAMLIT_SERVER_MAX_UPLOAD_SIZE=500
      - TM_MASTER_TOKEN=${TM_MASTER_TOKEN}
      - TM_USERNAME=${TM_USERNAME}
      - TM_SITENAME=${TM_SITENAME}
    restart: unless-stopped
